workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.nobetimplus.app"
        XCODE_SCHEME: "NobetimPlus"
        APP_STORE_APPLE_ID: "6766450087"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Dependencies
        script: |
          echo "Swift Package Manager project. CocoaPods hook is ready if pods are added later."
      - name: Generate Xcode project
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen generate --spec project.yml
      - name: Validate App Store Connect variables
        script: |
          test -n "$APP_STORE_CONNECT_PRIVATE_KEY" || (echo "APP_STORE_CONNECT_PRIVATE_KEY is missing from appstore_credentials" && exit 1)
          test -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" || (echo "APP_STORE_CONNECT_KEY_IDENTIFIER is missing from appstore_credentials" && exit 1)
          test -n "$APP_STORE_CONNECT_ISSUER_ID" || (echo "APP_STORE_CONNECT_ISSUER_ID is missing from appstore_credentials" && exit 1)
          test -n "$CERTIFICATE_PRIVATE_KEY" || (echo "CERTIFICATE_PRIVATE_KEY is missing from appstore_credentials. Add a 2048-bit RSA PEM private key for creating/fetching the Apple Distribution certificate." && exit 1)
          echo "App Store Connect and certificate credentials are available. Key contents are not printed."
      - name: Tests
        script: |
          SIMULATOR_ID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; data=json.load(sys.stdin); devices=[d for runtime in data["devices"].values() for d in runtime if d.get("isAvailable") and "iPhone" in d.get("name","")]; print(devices[0]["udid"] if devices else "")')
          if [ -z "$SIMULATOR_ID" ]; then
            echo "No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator $SIMULATOR_ID"
          xcodebuild test \
            -project NobetimPlus.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID"
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create
      - name: Add signing certificates
        script: |
          keychain add-certificates
      - name: Apply Xcode signing profiles
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build archive
        script: |
          xcodebuild archive \
            -project NobetimPlus.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/NobetimPlus.xcarchive" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID"
      - name: Export ipa
        script: |
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa"
          EXPORT_OPTIONS_PLIST="$CM_BUILD_DIR/export_options.plist"
          if [ ! -f "$EXPORT_OPTIONS_PLIST" ]; then
            PROFILE_NAME=""
            for PROFILE in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
              PROFILE_PLIST="$CM_BUILD_DIR/profile.plist"
              security cms -D -i "$PROFILE" > "$PROFILE_PLIST" 2>/dev/null || continue
              APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST" 2>/dev/null || true)
              if echo "$APP_IDENTIFIER" | grep -q "\\.$BUNDLE_ID$"; then
                PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
                break
              fi
            done
            if [ -z "$PROFILE_NAME" ]; then
              echo "No provisioning profile name found for $BUNDLE_ID"
              ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
              exit 1
            fi
            echo "Using provisioning profile: $PROFILE_NAME"
            cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          fi
          echo "Using export options: $EXPORT_OPTIONS_PLIST"
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/NobetimPlus.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/NobetimPlus.xcarchive/dSYMs/*.dSYM
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

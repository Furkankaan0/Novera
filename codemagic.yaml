workflows:
  ios-testflight:
    name: Növera — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.novera.app
      vars:
        BUNDLE_ID: "com.novera.app"
        XCODE_SCHEME: "Növera"
        XCODE_PROJECT: "Növera.xcodeproj"
        XCODE_WORKSPACE: ""  # Leave empty — no workspace, direct project
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        CERTIFICATE_PRIVATE_KEY: $CERTIFICATE_PRIVATE_KEY
      xcode: latest
      node: 20

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
        - pattern: "release/*"
          include: true

    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          echo "Setting build number to: $NEW_BUILD_NUMBER"
          agvtool new-version -all $NEW_BUILD_NUMBER

      - name: Build and archive iOS app
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config "Release" \
            --archive-flags="-destination 'generic/platform=iOS'" \
            --export-options-plist /Users/builder/export_options.plist

      - name: Generate export options plist
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>uploadBitcode</key>
              <false/>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
          - "Beta Kullanıcıları"
        expire_build_submitted_for_review: false

      email:
        recipients:
          - $CM_EMAIL_NOTIFICATIONS
        notify:
          success: true
          failure: true

  ios-simulator-test:
    name: Növera — Simulator Validation
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true

    scripts:
      - name: Build for simulator
        script: |
          xcodebuild \
            -project "$CM_BUILD_DIR/Növera.xcodeproj" \
            -scheme "Növera" \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro" \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Run unit tests
        script: |
          xcodebuild \
            -project "$CM_BUILD_DIR/Növera.xcodeproj" \
            -scheme "Növera" \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro" \
            -configuration Debug \
            test \
            CODE_SIGNING_ALLOWED=NO | xcpretty --report junit

    artifacts:
      - "**/test-results/*.xml"

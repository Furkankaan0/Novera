workflows:
  ios-testflight:
    name: Növera — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.novera.app
      vars:
        BUNDLE_ID: "com.novera.app"
        XCODE_SCHEME: "Növera"
        XCODE_PROJECT: "Növera.xcodeproj"
      xcode: latest
      node: 20

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
        - pattern: "release/*"
          include: true

    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch and create signing files
        script: |
          python3 -c "import base64, os; open('/tmp/cert_key.pem', 'wb').write(base64.b64decode(os.environ.get('CERTIFICATE_PRIVATE_KEY', '')))"
          
          # Clean up local cache
          rm -rf "$HOME/Library/MobileDevice/Provisioning Profiles/"* 2>/dev/null || true
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          
          # Delete existing profiles on Apple Developer Portal to force recreation
          pip3 install pyjwt requests cryptography
          python3 -c "
          import os, time, requests, base64
          import jwt
          
          issuer_id = os.environ.get('APP_STORE_CONNECT_ISSUER_ID')
          key_id = os.environ.get('APP_STORE_CONNECT_KEY_IDENTIFIER')
          private_key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY')
          bundle_id = os.environ.get('BUNDLE_ID')
          
          if not all([issuer_id, key_id, private_key]):
              print('API keys missing, skipping profile deletion.')
              exit(0)
              
          if 'BEGIN PRIVATE KEY' not in private_key:
              try:
                  private_key = base64.b64decode(private_key).decode('utf-8')
              except:
                  pass
                  
          token = jwt.encode(
              {'iss': issuer_id, 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              private_key,
              algorithm='ES256',
              headers={'kid': key_id}
          )
          
          headers = {'Authorization': f'Bearer {token}'}
          
          print('Authenticating with App Store Connect API...')
          r = requests.get(f'https://api.appstoreconnect.apple.com/v1/bundleIds?filter[identifier]={bundle_id}', headers=headers)
          if r.status_code == 200 and r.json().get('data'):
              bid_id = r.json()['data'][0]['id']
              r2 = requests.get(f'https://api.appstoreconnect.apple.com/v1/profiles?filter[bundleId]={bid_id}&filter[profileType]=IOS_APP_STORE', headers=headers)
              if r2.status_code == 200:
                  for p in r2.json().get('data', []):
                      print(f'Deleting invalid profile: {p[\"attributes\"][\"name\"]}')
                      requests.delete(f'https://api.appstoreconnect.apple.com/v1/profiles/{p[\"id\"]}', headers=headers)
          "
          
          # Fetch fresh signing files
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "@file:/tmp/cert_key.pem"
            
      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          echo "Setting build number to: $NEW_BUILD_NUMBER"
          agvtool new-version -all $NEW_BUILD_NUMBER
          
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Generate export options plist
        script: |
          # Search all possible directories where Codemagic might have saved the newly fetched profile
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/.app-store-connect" "$CM_BUILD_DIR" -name "*.mobileprovision" 2>/dev/null | head -n 1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "No provisioning profile found anywhere on the system!"
            exit 1
          fi
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Found Profile UUID: $PROFILE_UUID"

          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>J5CYS3RDGH</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$PROFILE_UUID</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and archive iOS app
        script: |
          set +e
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config "Release" \
            --archive-flags="-destination 'generic/platform=iOS' DEVELOPMENT_TEAM=J5CYS3RDGH" \
            --export-options-plist /Users/builder/export_options.plist
          
          if [ $? -ne 0 ]; then
            echo "--- XCODEBUILD ERROR LOG ---"
            cat /tmp/xcodebuild_archive.log 2>/dev/null || find /Users/builder/clone -name "*.log" -exec cat {} +
            exit 1
          fi
          set -e

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
          - "Beta Kullanıcıları"
        expire_build_submitted_for_review: false



  ios-simulator-test:
    name: Növera — Simulator Validation
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true

    scripts:
      - name: Build for simulator
        script: |
          xcodebuild \
            -project "$CM_BUILD_DIR/Növera.xcodeproj" \
            -scheme "Növera" \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro" \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Run unit tests
        script: |
          xcodebuild \
            -project "$CM_BUILD_DIR/Növera.xcodeproj" \
            -scheme "Növera" \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro" \
            -configuration Debug \
            test \
            CODE_SIGNING_ALLOWED=NO | xcpretty --report junit

    artifacts:
      - "**/test-results/*.xml"

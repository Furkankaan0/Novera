workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.nobetimplus.app"
        XCODE_SCHEME: "NobetimPlus"
        APP_STORE_APPLE_ID: "6766450087"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Dependencies
        script: |
          echo "Swift Package Manager project. CocoaPods hook is ready if pods are added later."
      - name: Validate App Store Connect variables
        script: |
          test -n "$APP_STORE_CONNECT_PRIVATE_KEY" || (echo "APP_STORE_CONNECT_PRIVATE_KEY is missing from appstore_credentials" && exit 1)
          test -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" || (echo "APP_STORE_CONNECT_KEY_IDENTIFIER is missing from appstore_credentials" && exit 1)
          test -n "$APP_STORE_CONNECT_ISSUER_ID" || (echo "APP_STORE_CONNECT_ISSUER_ID is missing from appstore_credentials" && exit 1)
          echo "App Store Connect credentials are available. Key contents are not printed."
      - name: Tests
        script: |
          xcodebuild test \
            -project NobetimPlus.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=latest'
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates
        script: |
          keychain add-certificates
      - name: Apply Xcode signing profiles
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build archive
        script: |
          xcodebuild archive \
            -project NobetimPlus.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/NobetimPlus.xcarchive" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID"
      - name: Export ipa
        script: |
          xcode-project build-ipa \
            --project NobetimPlus.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --archive "$CM_BUILD_DIR/build/NobetimPlus.xcarchive" \
            --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
      - build/NobetimPlus.xcarchive/dSYMs/*.dSYM
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
